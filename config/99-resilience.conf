# /etc/sysctl.d/99-resilience.conf
# Auto-reboot em kernel panic e situações críticas

# Reboot automático 10s após kernel panic (ao invés de travar pra sempre)
kernel.panic = 10

# Tratar kernel oops como panic (evita sistema "meio vivo" sem responder)
kernel.panic_on_oops = 1

# Se o disco travar por muito tempo em I/O, trata como panic
kernel.hung_task_panic = 1
kernel.hung_task_timeout_secs = 120
