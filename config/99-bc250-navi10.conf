<?xml version="1.0"?>
<!DOCTYPE driinfo SYSTEM "driinfo.dtd">

<!--
    Spoof BC-250 (Cyan Skillfish / GFX1013) como Navi10 (RX 5700 XT).
    Melhora compatibilidade com jogos e DXVK que não reconhecem GFX1013.
    Instalar em: /etc/drirc.d/99-bc250-navi10.conf
-->
<driinfo>
    <device driver="radeonsi">
        <option name="chip_class_override" value="navi10" />
    </device>
    <device driver="amdgpu">
        <option name="chip_class_override" value="navi10" />
    </device>
    <device driver="radv">
        <option name="chip_class_override" value="navi10" />
    </device>
</driinfo>
